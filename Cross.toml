[target.armv7-unknown-linux-musleabihf]
pre-build = [
    "apt-get update && apt-get install -y pkg-config libudev-dev libinput-dev libdrm-dev libgl1-mesa-dev libxkbcommon-dev fonts-dejavu fontconfig",
    "fc-cache -fv",
]

[target.armv7-unknown-linux-musleabihf.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS",
    "PKG_CONFIG_SYSROOT_DIR",
    "PKG_CONFIG_PATH",
]
